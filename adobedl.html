<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Portal</title>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') { window.location.href = 'index.html'; }
    </script>
    <style>
        :root {
            --bg-body: #0a0a0a; --bg-sidebar: #111111; --bg-card: linear-gradient(145deg, #151515, #222222);
            --border-color: rgba(212, 175, 55, 0.15); --text-main: #ffffff; --text-sub: #aaaaaa;
            --gold: #d4af37; --gold-hover: linear-gradient(45deg, #af8f2c, #d4af37); --shadow: rgba(212, 175, 55, 0.2);
        }
        [data-theme="light"] {
            --bg-body: #f4f5f7; --bg-sidebar: #ffffff; --bg-card: linear-gradient(145deg, #ffffff, #eaeaea);
            --border-color: rgba(175, 143, 44, 0.3); --text-main: #1a1a1a; --text-sub: #555555; --shadow: rgba(175, 143, 44, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s, color 0.3s, border-color 0.3s; }
        body { background: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; }
        
        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; justify-content: space-between; padding: 30px 20px; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-brand h2 { color: var(--gold); font-size: 1.5rem; text-align: center; margin-bottom: 40px; text-shadow: 0 0 10px var(--shadow); }
        .sidebar-menu { list-style: none; flex-grow: 1; }
        .sidebar-link { text-decoration: none; display: block; margin-bottom: 10px; }
        .sidebar-item { padding: 14px 18px; color: var(--text-sub); font-weight: 600; cursor: pointer; border-radius: 8px; display: flex; align-items: center; gap: 12px; transition: all 0.3s; }
        .sidebar-link:hover .sidebar-item, .sidebar-link.active .sidebar-item { background: var(--gold); color: #111; box-shadow: 0 4px 12px var(--shadow); }
        
        .sidebar-footer { display: flex; flex-direction: column; gap: 15px; }
        .theme-toggle-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .theme-toggle-btn:hover { background: var(--gold); color: #111; }
        .btn-logout { background: transparent; border: none; color: #666; cursor: pointer; text-decoration: underline; text-align: center; }
        .btn-logout:hover { color: #ff4d4d; }

        .main-content { margin-left: 260px; padding: 50px 40px; width: calc(100% - 260px); }
        header { text-align: center; margin-bottom: 50px; }
        header h1 { color: var(--gold); font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 10px; text-shadow: 0 0 15px var(--shadow); }
        header p { color: var(--text-sub); font-size: 1rem; }

        .shortcut-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; align-items: start; margin: 0 auto; }
        .shortcut-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; transition: all 0.3s ease-in-out; position: relative; overflow: hidden; }
        .shortcut-card:hover { border-color: var(--gold); box-shadow: 0 10px 30px var(--shadow); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; padding-bottom: 10px; }
        .app-title { display: flex; align-items: center; gap: 10px; font-size: 1.3rem; font-weight: bold; }
        
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-ps { background-color: #31a8ff; } .dot-pr { background-color: #ea77ff; }
        .dot-ai { background-color: #ff9a00; } .dot-ae { background-color: #9999ff; }
        .dot-g2 { background-color: #00ffcc; } .dot-g5 { background-color: #4ef037; }

        .toggle-icon { color: var(--gold); font-size: 0.9rem; transition: transform 0.3s; background: rgba(212, 175, 55, 0.1); padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .shortcut-card.active .toggle-icon { transform: rotate(180deg); background: var(--gold); color: #111; }

        .app-details { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-in-out, padding 0.4s ease-in-out; color: var(--text-sub); font-size: 0.95rem; line-height: 1.6; }
        .shortcut-card.active .app-details { max-height: 600px; padding-top: 15px; padding-bottom: 15px; }
        .app-preview-img { width: 100%; height: auto; max-height: 180px; object-fit: cover; border-radius: 8px; margin-top: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.4); }

        .btn-link { display: block; text-align: center; padding: 12px; background: transparent; color: var(--gold); border: 2px solid var(--gold); border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.95rem; transition: all 0.3s; margin-top: 15px; }
        .btn-link:hover { background: var(--gold-hover); color: #111; box-shadow: 0 0 15px var(--shadow); }
        
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 12px; font-size: 0.85rem; width: fit-content; align-self: flex-end; }
        .btn-delete:hover { background: #cc3333; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand"><h2>PORTAL HUB</h2></div>
        <ul class="sidebar-menu">
            <a href="dashboard.html" class="sidebar-link"><li class="sidebar-item">🏠 หน้าหลัก</li></a>
            <a href="adobedl.html" id="nav-adobe" class="sidebar-link active"><li class="sidebar-item">🎨 หมวดหมู่ Adobe</li></a>
            <a href="gamesdl.html" id="nav-games" class="sidebar-link"><li class="sidebar-item">🎮 หมวดหมู่ Games</li></a>
            <a href="etcdl.html" id="nav-etc" class="sidebar-link"><li class="sidebar-item">📂 หมวดหมู่ ETC.</li></a>
        </ul>
        <div class="sidebar-footer">
            <button class="theme-toggle-btn" onclick="toggleTheme()"><span id="theme-icon">☀️</span> <span id="theme-text">Light Mode</span></button>
            <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
        </div>
    </nav>

    <main class="main-content">
        <header>
            <h1 id="pageTitle">WORKSPACE PORTAL</h1>
            <p>ระบบคลังดาวน์โหลดโปรแกรมและจัดการข้อมูลรวมศูนย์ของคุณ</p>
        </header>

        <div class="shortcut-grid" id="dataGrid">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 เอา Firebase Config ของคุณมาวางตรงนี้ให้ถูกต้องเหมือนหน้าแรก
        const firebaseConfig = {
  apiKey: "AIzaSyB-v9u49UfZ0CBt8bYQoFMCB6QuqLxspZk",
  authDomain: "download-hub-e940e.firebaseapp.com",
  databaseURL: "https://download-hub-e940e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "download-hub-e940e",
  storageBucket: "download-hub-e940e.firebasestorage.app",
  messagingSenderId: "950263847548",
  appId: "1:950263847548:web:809b1c61e1628303bb87f9",
  measurementId: "G-TWQJELXBWM"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 💡 จุดที่ 2: ระบุหมวดหมู่ของหน้านั้นๆ ('adobe', 'games', หรือ 'etc')
        const currentCategory = 'adobe'; 

        // 🌟 ฟังก์ชันดึงข้อมูลมาแสดงผล (Dynamic Render)
        async function renderItems() {
            const grid = document.getElementById('dataGrid');
            if (!grid) return;
            
            const isLatestAdmin = sessionStorage.getItem('role') === 'admin';

            try {
                const q = query(collection(db, "portalItems"), where("category", "==", currentCategory), orderBy("createdAt", "asc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    grid.innerHTML = `<p style="color:var(--text-sub); text-align:center; grid-column:1/-1; padding:40px;">ไม่มีข้อมูลรายการในหมวดหมู่นี้ กรุณาเข้าเพิ่มข้อมูลในหน้าแอดมิน</p>`;
                    return;
                }

                let htmlContent = '';
                querySnapshot.forEach((docSnap) => {
                    const item = docSnap.data();
                    const docId = docSnap.id;

                    htmlContent += `
                        <div class="shortcut-card">
                            <div>
                                <div class="card-header" onclick="toggleCard(this)">
                                    <div class="app-title"><span class="dot ${item.dotClass}"></span> ${item.title}</div>
                                    <span class="toggle-icon">▼ ดีเทล</span>
                                </div>
                                <div class="app-details">
                                    <p>${item.details}</p>
                                    ${item.accountInfo ? `<p>__________________________________________________</p><p style="margin-top:8px;">${item.accountInfo}</p>` : ''}
                                    <img src="${item.imgUrl}" alt="${item.title}" class="app-preview-img">
                                </div>
                            </div>
                            <a href="${item.downloadUrl}" target="_blank" class="btn-link">${item.btnText}</a>
                            ${isLatestAdmin ? `<button class="btn-delete" onclick="deleteItem('${docId}')">🗑️ ลบรายการนี้</button>` : ''}
                        </div>
                    `;
                });
                
                grid.innerHTML = htmlContent;
            } catch (error) {
                console.error("Error: ", error);
                grid.innerHTML = `<p style="color:red; text-align:center; grid-column:1/-1;">เกิดข้อผิดพลาดในการดึงข้อมูลจากฐานข้อมูลคลาวด์</p>`;
            }
        }

        // 🌟 ผูกฟังก์ชันเข้ากับ window เพื่อให้ HTML ฝั่งปุ่มกดสามารถมองเห็นและเรียกใช้ได้
        window.toggleCard = function(headerElement) {
            headerElement.closest('.shortcut-card').classList.toggle('active');
        }

        window.deleteItem = async function(id) {
            if (confirm('คุณแน่ใจหรือไม่ว่าต้องการลบรายการนี้ออกจาก Firebase?')) {
                try {
                    await deleteDoc(doc(db, "portalItems", id));
                    alert('ลบรายการสำเร็จแล้วครับ!');
                    renderItems();
                } catch (error) {
                    alert('ไม่สามารถลบข้อมูลได้: ' + error.message);
                }
            }
        }

        window.toggleTheme = function() {
            const currentTheme = document.body.getAttribute('data-theme');
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');
            if (currentTheme === 'light') {
                document.body.removeAttribute('data-theme');
                themeIcon.innerText = '☀️'; themeText.innerText = 'Light Mode';
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeIcon.innerText = '🌙'; themeText.innerText = 'Dark Mode';
            }
        }

        window.logout = function() { 
            sessionStorage.clear(); 
            window.location.href = 'index.html'; 
        }

        // ⚙️ ตรวจสอบสิทธิ์แอดมิน เพื่อแสดงลิ้งก์ไปหน้าแอดมินบนเมนูด้านข้าง
        if (sessionStorage.getItem('role') === 'admin') {
            const sidebarMenu = document.querySelector('.sidebar-menu');
            if (sidebarMenu) {
                const adminLink = document.createElement('a');
                adminLink.href = 'admin.html';
                adminLink.className = 'sidebar-link';
                adminLink.innerHTML = `<li class="sidebar-item" style="border: 1px dashed var(--gold); color: var(--gold);">⚙️ หน้าแอดมินอัปโหลด</li>`;
                sidebarMenu.appendChild(adminLink);
            }
        }

        // เรียกใช้งานฟังก์ชันดึงข้อมูลทันทีเมื่อโหลดหน้าเว็บสำเร็จ
        document.addEventListener('DOMContentLoaded', renderItems);
    </script>
</body>
</html>
