<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Workspace Portal</title>
    <style>
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: linear-gradient(145deg, #111111, #1a1a1a);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.05);
        }
        h2 {
            color: #d4af37;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus {
            border-color: #d4af37;
            outline: none;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #d4af37;
            color: #111;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #af8f2c;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>PORTAL LOGIN</h2>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="เช่น admin@portal.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="กรอกรหัสผ่าน">
            </div>
            <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 🔥 กรุณาตรวจสอบและใช้ข้อมูล Config ของคุณที่ได้มาจาก Firebase Console ตรงนี้ครับ
        const firebaseConfig = {
  apiKey: "AIzaSyB-v9u49UfZ0CBt8bYQoFMCB6QuqLxspZk",
  authDomain: "download-hub-e940e.firebaseapp.com",
  databaseURL: "https://download-hub-e940e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "download-hub-e940e",
  storageBucket: "download-hub-e940e.firebasestorage.app",
  messagingSenderId: "950263847548",
  appId: "1:950263847548:web:809b1c61e1628303bb87f9",
  measurementId: "G-TWQJELXBWM"
};

        // เริ่มต้นระบุตัวตน Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 🌟 ประกาศฟังก์ชันไว้ที่ window เพื่อให้แท็ก <form> ด้านบนกดเรียกใช้งานได้
        window.handleLogin = function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            signInWithEmailAndPassword(auth, email, pass)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('username', user.email.split('@')[0]); 
                    
                    // เช็กสิทธิ์การใช้งานจากชื่ออีเมล
                    if (user.email.startsWith('admin')) {
                        sessionStorage.setItem('role', 'admin');
                    } else {
                        sessionStorage.setItem('role', 'user');
                    }
                    
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    console.error("Login Error: ", error);
                    alert('อีเมลหรือรหัสผ่านไม่ถูกต้อง หรือเกิดข้อผิดพลาด: ' + error.message);
                });
        }
    </script>
</body>
</html>
